name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Locate Project and Setup Wrapper
      run: |
        # Cari lokasi build.gradle yang ada di dalam workspace repositori GitHub
        GRADLE_FILE=$(find $GITHUB_WORKSPACE -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)
        PROJECT_DIR=$(dirname "$GRADLE_FILE")
        echo "Menemukan folder project di: $PROJECT_DIR"
        
        # Pindah ke folder tersebut dan buat wrapper
        cd "$PROJECT_DIR"
        gradle wrapper
        chmod +x gradlew
        
        # Simpan lokasi folder agar bisa dipakai di step berikutnya
        echo "FINAL_PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

    - name: Build with Gradle
      run: |
        cd "${{ env.FINAL_PROJECT_DIR }}"
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: "**/build/outputs/apk/debug/*.apk"
