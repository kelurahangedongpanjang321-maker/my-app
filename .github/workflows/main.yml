name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Initialize Gradle Wrapper if missing
      run: |
        PROJECT_DIR=$(find . -name "build.gradle*" -exec dirname {} \;)
        echo "Project directory found at: $PROJECT_DIR"
        cd $PROJECT_DIR
        gradle wrapper
        chmod +x gradlew
        echo "FINAL_DIR=$PROJECT_DIR" >> $GITHUB_ENV

    - name: Build with Gradle
      run: |
        cd ${{ env.FINAL_DIR }}
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: "**/build/outputs/apk/debug/*.apk"
