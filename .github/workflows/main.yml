name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Auto Locate Android Project and Bypass Env & Keystore
      run: |
        # Cari lokasi build.gradle yang ada di repositori
        GRADLE_FILE=$(find . -name "build.gradle" -o -name "build.gradle.kts" | grep -v "node_modules" | head -n 1)
        PROJECT_DIR=$(dirname "$GRADLE_FILE")
        ABS_PROJECT_DIR=$(cd "$PROJECT_DIR" && pwd)
        echo "Menemukan lokasi project di: $ABS_PROJECT_DIR"
        
        cd "$ABS_PROJECT_DIR"
        
        # Buat file .env otomatis agar tidak error
        if [ ! -f ".env.example" ]; then
          echo "GEMINI_API_KEY=your_key_here" > .env.example
        fi
        if [ ! -f ".env" ]; then
          echo "GEMINI_API_KEY=your_key_here" > .env
        fi
        
        # Setup Wrapper
        gradle wrapper
        chmod +x gradlew
        
        echo "TARGET_ANDROID_DIR=$ABS_PROJECT_DIR" >> $GITHUB_ENV

    - name: Build with Gradle (Bypass Signing)
      run: |
        cd "${{ env.TARGET_ANDROID_DIR }}"
        # Perintah khusus untuk merakit kode tanpa memvalidasi file debug.keystore yang hilang
        ./gradlew assembleDebug -Pandroid.injected.signing.config.signingReady=true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: "**/build/outputs/apk/debug/*.apk"
